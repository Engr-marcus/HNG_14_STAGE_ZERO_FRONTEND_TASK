<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
    <style></style>
  </head>
  <body>
    <div class="wrapper">
      <header class="page-header" aria-hidden="true">
        <h1>Focus</h1>
        <p>Stay organized, achieve more</p>
      </header>

      <!-- ════════════════════════════════════
         MAIN TODO CARD
         ════════════════════════════════════ -->
      <article
        data-testid="test-todo-card"
        role="region"
        aria-label="Task card: Redesign landing page hero section"
      >
        <!-- ── Top: checkbox + title + description ── -->
        <div class="card-top">
          <div class="checkbox-wrap">
            <input
              type="checkbox"
              id="todo-toggle"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
            <label for="todo-toggle">Done</label>
          </div>

          <div class="titles">
            <h3 id="todo-title" data-testid="test-todo-title">
              Redesign landing page hero section
            </h3>
            <p data-testid="test-todo-description">
              Update the hero with new brand visuals, revised headline copy, and
              a CTA button leading to the waitlist form.
            </p>
          </div>
        </div>

        <!-- ── Badges: priority + status ── -->
        <div class="badges">
          <span
            class="badge priority-high"
            data-testid="test-todo-priority"
            aria-label="Priority: High"
            >High</span
          >

          <span
            class="badge status-progress"
            id="todo-status"
            data-testid="test-todo-status"
            aria-label="Status: In Progress"
            >In Progress</span
          >
        </div>

        <!-- ── Due date + time remaining ── -->
        <div class="dates-row">
          <time
            datetime="2026-04-16T18:00:00Z"
            data-testid="test-todo-due-date"
            aria-label="Due April 18, 2026"
          >
            <!-- calendar icon -->
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="3" y1="10" x2="21" y2="10" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="16" y1="2" x2="16" y2="6" />
            </svg>
            Due Apr 16, 2026
          </time>

          <time
            id="time-remaining"
            data-testid="test-todo-time-remaining"
            datetime="2026-04-18T18:00:00Z"
            aria-live="polite"
            aria-label="Time remaining"
          >
            <!-- clock icon -->
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span id="time-text"> Due in 2 days</span>
          </time>
        </div>

        <!-- ── Tags ── -->
        <ul role="list" data-testid="test-todo-tags" aria-label="Task tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li data-testid="test-todo-tag-design">design</li>
        </ul>

        <!-- ── Action buttons ── -->
        <div class="actions">
          <button
            class="action-btn"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
            type="button"
            onclick="console.log('edit clicked')"
          >
            <!-- pencil icon -->
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              />
            </svg>
            Edit
          </button>

          <button
            class="action-btn delete-btn"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            type="button"
            onclick="alert('Delete clicked')"
          >
            <!-- trash icon -->
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
            </svg>
            Delete
          </button>
        </div>
      </article>
    </div>
    <!-- /.wrapper -->

    <script src="script.js"></script>
  </body>
</html>
